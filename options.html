<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Configuración</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-container: #ffffff;
            --text-main: #222;
            --text-secondary: #555;
            --border-color: #ddd;
            --bg-panel: #f8f9fa;
            --input-bg: #ffffff;
        }

        body.dark-theme {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #333;
            --bg-panel: #252525;
            --input-bg: #2d2d2d;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 24px; transition: 0.3s; }
        .container { max-width: 780px; margin: 0 auto; background: var(--bg-container); border-radius: 16px; padding: 28px; box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 8px; }
        h1 { margin: 0; font-size: 24px; }
        p { margin: 0 0 20px; color: var(--text-secondary); line-height: 1.5; }
        .section { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 14px; padding: 18px; margin-top: 16px; }
        .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .field-row input[type="password"], .field-row input[type="text"] { flex: 1 1 280px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 15px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
        .btn { border: 0; border-radius: 10px; padding: 11px 16px; cursor: pointer; font-weight: 700; }
        .btn-primary { background: #d32f2f; color: white; }
        .btn-secondary { background: #1976d2; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn-neutral { background: #eceff1; color: #263238; }
        body.dark-theme .btn-neutral { background: #2b2b2b; color: #e0e0e0; }
        .meta-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 12px; }
        .meta-card { padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.65); border: 1px solid var(--border-color); }
        body.dark-theme .meta-card { background: rgba(255,255,255,0.03); }
        .meta-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
        .meta-value { font-size: 15px; font-weight: 600; }
        .muted { color: var(--text-secondary); }
        #theme-toggle-opt { background: none; border: 1px solid var(--border-color); border-radius: 50%; width: 38px; height: 38px; font-size: 18px; cursor: pointer; color: var(--text-main); }
        #tokenStatus { margin-top: 8px; font-size: 13px; color: var(--text-secondary); }
        .footer-note { margin-top: 16px; font-size: 13px; color: var(--text-secondary); }
        @media (max-width: 640px) {
            body { padding: 14px; }
            .container { padding: 20px; }
            .meta-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Configuración</h1>
                <p>Ingresa el token generado en CodeRED Platform para sincronizar el catálogo de agencias.</p>
            </div>
            <button id="theme-toggle-opt" title="Cambiar tema">🌓</button>
        </div>

        <div class="section">
            <div class="field-row">
                <input type="password" id="apiToken" placeholder="Token de API" autocomplete="off" spellcheck="false">
                <button id="toggleApiToken" class="btn btn-neutral" type="button">Mostrar</button>
            </div>
            <div class="actions">
                <button id="saveTokenBtn" class="btn btn-primary" type="button">Guardar token</button>
                <button id="testConnectionBtn" class="btn btn-secondary" type="button">Probar conexión</button>
                <button id="clearTokenBtn" class="btn btn-danger" type="button">Limpiar token</button>
            </div>
            <div id="tokenStatus">Estado de conexión: sin configurar</div>
        </div>

        <div class="section">
            <strong>Estado del catálogo</strong>
            <div class="meta-grid">
                <div class="meta-card">
                    <span class="meta-label">Última sincronización</span>
                    <div class="meta-value" id="lastSyncValue">Nunca</div>
                </div>
                <div class="meta-card">
                    <span class="meta-label">Agencias disponibles</span>
                    <div class="meta-value" id="agencyCountValue">0</div>
                </div>
                <div class="meta-card">
                    <span class="meta-label">Fuente</span>
                    <div class="meta-value" id="sourceValue">CodeRED Platform</div>
                </div>
                <div class="meta-card">
                    <span class="meta-label">Versión de esquema</span>
                    <div class="meta-value" id="schemaValue">1</div>
                </div>
            </div>
            <div class="footer-note" id="syncSummary">Última sincronización: nunca</div>
        </div>
    </div>

    <script src="extensionShared.js"></script>
    <script src="agencyStore.js"></script>
    <script src="coderedApi.js"></script>
    <script src="options.js"></script>
</body>
</html>
