<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Agencias Shalom</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --text-main: #222;
            --card-bg: #fff;
            --border: #ddd;
            --primary: #d32f2f;
        }
        body.dark-theme {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --card-bg: #1e1e1e;
            --border: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; transition: 0.3s; }
        .header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg-body); padding-bottom: 15px; border-bottom: 2px solid var(--border); z-index: 100; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-main); font-size: 18px; }
        input[type="text"] { flex-grow: 1; min-width: 250px; }
        
        .agency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: 0.2s; position: relative; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .card b { display: block; font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        
        .badge { font-size: 12px; padding: 3px 10px; border-radius: 6px; font-weight: bold; text-transform: uppercase; margin-right: 6px; }
        .badge-segment { background: #eee; color: #444; }
        .badge-co { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .badge-tamano { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }

        .card .info { font-size: 18px; margin-top: 12px; line-height: 1.5; }
        .card .direccion { display: block; margin-top: 8px; color: #777; font-size: 16px; font-style: italic; }
        .card .footer-id { margin-top: 18px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 14px; opacity: 0.6; }

        /* Modal Detalle Animado */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-content-enlarged {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            border: 1px solid var(--border);
        }
        .modal-overlay.active .modal-content-enlarged {
            transform: scale(1);
        }
        .modal-content-enlarged b { font-size: 36px; }
        .modal-content-enlarged .info { font-size: 21px; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="controls">
            <h2 style="margin:0; color: var(--primary);">📦 Catálogo de Agencias</h2>
            <input type="text" id="search" placeholder="🔍 Buscar por nombre, dirección, distrito o departamento...">
            <select id="filterSegment">
                <option value="TODOS">Segmento: Todos</option>
                <option value="TERRESTRE">🚛 Terrestre</option>
                <option value="AEREO">✈️ Aéreo</option>
            </select>
            <select id="filterType">
                <option value="TODOS">Tipo: Todos</option>
                <option value="AGENCIA">Solo Agencias</option>
                <option value="CO">Solo CO</option>
            </select>
            <select id="filterSize">
                <option value="TODOS">Cualquier Tamaño</option>
                <option value="Grande">Grande</option>
                <option value="Mediana">Mediana</option>
                <option value="Micro">Micro</option>
                <option value="Mini-micro">Mini-micro</option>
                <option value="Pequeña">Pequeña</option>
                <option value="Punto Pro">Punto Pro</option>
                <option value="Terminal">Terminal</option>
            </select>
        </div>
        <div id="stats" style="font-size: 14px; font-weight: 500;">Cargando agencias desde la nube...</div>
    </div>
    
    <div class="agency-grid" id="grid"></div>

    <!-- Modal para ver detalle grande -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content-enlarged" id="modalBody"></div>
    </div>

    <script src="agencyStore.js"></script>
    <script src="grid.js"></script>
</body>
</html>
